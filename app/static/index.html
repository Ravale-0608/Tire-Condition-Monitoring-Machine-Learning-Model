<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Tire Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 20px 24px 16px;
      text-align: center;
      border-bottom: 1px solid #1e293b;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    header p  { font-size: 0.8rem; color: #64748b; margin-top: 4px; }

    .main {
      width: 100%;
      max-width: 480px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Camera / upload area ── */
    .capture-area {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #1e293b;
      border-radius: 16px;
      overflow: hidden;
      border: 2px dashed #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .capture-area:hover { border-color: #3b82f6; }

    .capture-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .capture-area img.visible { display: block; }

    .capture-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #475569;
      pointer-events: none;
    }
    .capture-placeholder svg { width: 48px; height: 48px; }
    .capture-placeholder p { font-size: 0.9rem; }

    #fileInput { display: none; }

    /* ── Buttons ── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }

    .btn-camera  { background: #3b82f6; color: #fff; }
    .btn-gallery { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .btn-scan    {
      grid-column: 1 / -1;
      background: #22c55e;
      color: #fff;
      font-size: 1.1rem;
      padding: 16px;
      display: none;
    }
    .btn-scan.visible { display: flex; }

    /* ── Result card ── */
    .result-card {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 16px;
      border-left: 4px solid #3b82f6;
    }
    .result-card.visible { display: flex; }

    .result-top {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .result-icon { font-size: 2.5rem; line-height: 1; }
    .result-info h2 { font-size: 1.2rem; font-weight: 700; }
    .result-info p  { font-size: 0.85rem; color: #94a3b8; margin-top: 2px; }

    .conf-bar-wrap { width: 100%; }
    .conf-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: #64748b;
      margin-bottom: 6px;
    }
    .conf-bar-bg {
      height: 8px;
      background: #0f172a;
      border-radius: 99px;
      overflow: hidden;
    }
    .conf-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: #22c55e;
      transition: width 0.6s ease;
    }

    .top3-list { display: flex; flex-direction: column; gap: 8px; }
    .top3-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
      padding: 8px 12px;
      background: #0f172a;
      border-radius: 8px;
    }
    .top3-item .name  { color: #cbd5e1; }
    .top3-item .pct   { font-weight: 600; }

    /* ── Loading spinner ── */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      margin: 0 auto;
    }
    .spinner.visible { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>🔍 Tire Scanner</h1>
  <p>AI-powered tire condition analysis</p>
</header>

<div class="main">

  <!-- Image preview -->
  <div class="capture-area" id="captureArea" onclick="document.getElementById('fileInput').click()">
    <img id="preview" alt="preview">
    <div class="capture-placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z" />
      </svg>
      <p>Tap to take a photo or upload</p>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" capture="environment">

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-camera" onclick="openCamera()">📷 Camera</button>
    <button class="btn btn-gallery" onclick="openGallery()">🖼 Gallery</button>
    <button class="btn btn-scan" id="scanBtn" onclick="scan()">Scan Tire</button>
  </div>

  <!-- Spinner -->
  <div class="spinner" id="spinner"></div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-top">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-info">
        <h2 id="resultLabel"></h2>
        <p id="resultClass"></p>
      </div>
    </div>

    <div class="conf-bar-wrap">
      <div class="conf-label">
        <span>Confidence</span>
        <span id="confPct"></span>
      </div>
      <div class="conf-bar-bg">
        <div class="conf-bar-fill" id="confBar" style="width:0%"></div>
      </div>
    </div>

    <div class="top3-list" id="top3List"></div>
  </div>

</div>

<script>
  const fileInput  = document.getElementById("fileInput");
  const preview    = document.getElementById("preview");
  const placeholder= document.getElementById("placeholder");
  const scanBtn    = document.getElementById("scanBtn");
  const spinner    = document.getElementById("spinner");
  const resultCard = document.getElementById("resultCard");

  function openCamera() {
    fileInput.setAttribute("capture", "environment");
    fileInput.click();
  }
  function openGallery() {
    fileInput.removeAttribute("capture");
    fileInput.click();
  }

  fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (!file) return;
    preview.src = URL.createObjectURL(file);
    preview.classList.add("visible");
    placeholder.style.display = "none";
    scanBtn.classList.add("visible");
    resultCard.classList.remove("visible");
  });

  async function scan() {
    const file = fileInput.files[0];
    if (!file) return;

    scanBtn.classList.remove("visible");
    spinner.classList.add("visible");
    resultCard.classList.remove("visible");

    const form = new FormData();
    form.append("file", file);

    try {
      const res  = await fetch("/predict", { method: "POST", body: form });
      const data = await res.json();

      if (data.error) throw new Error(data.error);

      // Populate result card
      document.getElementById("resultIcon").textContent  = data.icon;
      document.getElementById("resultLabel").textContent = data.label;
      document.getElementById("resultLabel").style.color = data.color;
      document.getElementById("resultClass").textContent = `Class: ${data.class}`;
      document.getElementById("confPct").textContent     = `${data.confidence}%`;

      const bar = document.getElementById("confBar");
      bar.style.background = data.color;
      setTimeout(() => { bar.style.width = data.confidence + "%"; }, 50);

      const top3 = document.getElementById("top3List");
      top3.innerHTML = data.top3.map(t => `
        <div class="top3-item">
          <span class="name">${t.icon} ${t.label}</span>
          <span class="pct" style="color:${t.color}">${t.confidence}%</span>
        </div>
      `).join("");

      resultCard.style.borderLeftColor = data.color;
      resultCard.classList.add("visible");

    } catch (err) {
      alert("Error: " + err.message);
    } finally {
      spinner.classList.remove("visible");
      scanBtn.classList.add("visible");
    }
  }
</script>

</body>
</html>
