<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tire Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Video layer ── */
    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Canvas overlay (same size, on top) ── */
    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      padding: 16px 20px 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,.75) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse-dot 1.4s ease-in-out infinite;
    }
    .status-dot.live { background: #22c55e; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ── Result bar at bottom ── */
    #resultBar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 20px 24px 32px;
      background: linear-gradient(to top, rgba(0,0,0,.85) 0%, transparent 100%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: opacity 0.3s;
      opacity: 0;
    }
    #resultBar.visible { opacity: 1; }

    .result-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #conditionLabel {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    #confidencePct {
      font-size: 1.1rem;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
    }

    /* Confidence bar */
    .conf-track {
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 99px;
      overflow: hidden;
    }
    #confFill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width 0.4s ease, background 0.4s;
    }

    /* ── No camera message ── */
    #noCamera {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #0f172a;
      text-align: center;
      padding: 32px;
    }
    #noCamera.visible { display: flex; }
    #noCamera p { color: #94a3b8; font-size: 0.9rem; }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>

<header>
  <h1>🔍 Tire Scanner</h1>
  <div class="status-dot" id="statusDot"></div>
</header>

<div id="resultBar">
  <div class="result-main">
    <span id="conditionLabel">Scanning…</span>
    <span id="confidencePct"></span>
  </div>
  <div class="conf-track">
    <div id="confFill"></div>
  </div>
</div>

<div id="noCamera">
  <p style="font-size:2rem">📷</p>
  <p>Camera access required.<br>Please allow camera permissions and reload.</p>
</div>

<script>
const video     = document.getElementById('video');
const canvas    = document.getElementById('overlay');
const ctx       = canvas.getContext('2d');
const statusDot = document.getElementById('statusDot');
const resultBar = document.getElementById('resultBar');
const noCamera  = document.getElementById('noCamera');

// ── State ──────────────────────────────────────────────────────────────────
let lastResult  = null;
let scanY       = 0;          // current scan line Y (normalised 0-1 within box)
let scanDir     = 1;
let animFrame   = null;
let ws          = null;
let wsReady     = false;
let sendPending = false;

// ── Camera ────────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    resizeCanvas();
    startWS();
    drawLoop();
  } catch (e) {
    noCamera.classList.add('visible');
    console.error(e);
  }
}

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);

// ── WebSocket ────────────────────────────────────────────────────────────
function startWS() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.binaryType = 'blob';

  ws.onopen = () => {
    wsReady = true;
    statusDot.classList.add('live');
    scheduleCapture();
  };
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (!data.error) lastResult = data;
    } catch (_) {}
    sendPending = false;
    scheduleCapture();
  };
  ws.onclose = () => {
    wsReady = false;
    statusDot.classList.remove('live');
    setTimeout(startWS, 2000);
  };
  ws.onerror = () => ws.close();
}

function scheduleCapture() {
  setTimeout(captureAndSend, 200);
}

function captureAndSend() {
  if (!wsReady || sendPending || ws.readyState !== WebSocket.OPEN) return;
  if (!video.videoWidth) return;

  const offscreen   = document.createElement('canvas');
  offscreen.width   = 640;
  offscreen.height  = 480;
  offscreen.getContext('2d').drawImage(video, 0, 0, 640, 480);
  offscreen.toBlob(blob => {
    if (blob && ws.readyState === WebSocket.OPEN) {
      sendPending = true;
      ws.send(blob);
    }
  }, 'image/jpeg', 0.82);
}

// ── Draw loop ────────────────────────────────────────────────────────────
function drawLoop() {
  animFrame = requestAnimationFrame(drawLoop);
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const res   = lastResult;
  const color = res ? res.color : '#3b82f6';

  if (res && res.box) {
    const bx = res.box.x * W;
    const by = res.box.y * H;
    const bw = res.box.w * W;
    const bh = res.box.h * H;

    drawBox(bx, by, bw, bh, color);
    drawScanLine(bx, by, bw, bh, color);
    updateResultBar(res);
  } else {
    // No result yet — draw a centered placeholder ring
    drawTargetRing(W, H, color);
  }

  // Advance scan line
  scanY += scanDir * 0.012;
  if (scanY > 1) { scanY = 1; scanDir = -1; }
  if (scanY < 0) { scanY = 0; scanDir =  1; }
}

// ── Drawing helpers ───────────────────────────────────────────────────────

function drawBox(x, y, w, h, color) {
  const cornerLen = Math.min(w, h) * 0.18;
  const r = 8;

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth   = 3;
  ctx.shadowColor = color;
  ctx.shadowBlur  = 12;

  // Corner brackets
  const corners = [
    [x, y, 1, 1], [x+w, y, -1, 1], [x, y+h, 1, -1], [x+w, y+h, -1, -1]
  ];
  for (const [cx, cy, dx, dy] of corners) {
    ctx.beginPath();
    ctx.moveTo(cx + dx * cornerLen, cy);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx, cy + dy * cornerLen);
    ctx.stroke();
  }

  // Dim border
  ctx.shadowBlur  = 0;
  ctx.strokeStyle = color + '55';
  ctx.lineWidth   = 1.5;
  ctx.strokeRect(x, y, w, h);

  ctx.restore();
}

function drawScanLine(bx, by, bw, bh, color) {
  const lineY = by + bh * scanY;

  ctx.save();
  // Glow
  const grad = ctx.createLinearGradient(bx, lineY, bx + bw, lineY);
  grad.addColorStop(0,   'transparent');
  grad.addColorStop(0.2, color + 'cc');
  grad.addColorStop(0.5, color);
  grad.addColorStop(0.8, color + 'cc');
  grad.addColorStop(1,   'transparent');

  ctx.beginPath();
  ctx.moveTo(bx, lineY);
  ctx.lineTo(bx + bw, lineY);
  ctx.strokeStyle = grad;
  ctx.lineWidth   = 2.5;
  ctx.shadowColor = color;
  ctx.shadowBlur  = 14;
  ctx.stroke();

  // Thin bright core
  ctx.beginPath();
  ctx.moveTo(bx, lineY);
  ctx.lineTo(bx + bw, lineY);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth   = 1;
  ctx.shadowBlur  = 0;
  ctx.globalAlpha = 0.6;
  ctx.stroke();
  ctx.restore();
}

function drawTargetRing(W, H, color) {
  const cx = W / 2, cy = H / 2;
  const r  = Math.min(W, H) * 0.32;

  ctx.save();
  ctx.strokeStyle = color + '88';
  ctx.lineWidth   = 2;
  ctx.setLineDash([12, 8]);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Scan line across ring
  const lineY = cy - r + r * 2 * scanY;
  const halfW = Math.sqrt(Math.max(0, r*r - (lineY-cy)**2));

  const grad = ctx.createLinearGradient(cx - halfW, lineY, cx + halfW, lineY);
  grad.addColorStop(0,   'transparent');
  grad.addColorStop(0.3, color + 'aa');
  grad.addColorStop(0.5, color);
  grad.addColorStop(0.7, color + 'aa');
  grad.addColorStop(1,   'transparent');

  ctx.beginPath();
  ctx.moveTo(cx - halfW, lineY);
  ctx.lineTo(cx + halfW, lineY);
  ctx.strokeStyle = grad;
  ctx.lineWidth   = 2;
  ctx.shadowColor = color;
  ctx.shadowBlur  = 10;
  ctx.stroke();
  ctx.restore();
}

function updateResultBar(res) {
  const label = document.getElementById('conditionLabel');
  const pct   = document.getElementById('confidencePct');
  const fill  = document.getElementById('confFill');

  label.textContent   = res.label;
  label.style.color   = res.color;
  pct.textContent     = `${res.confidence}%`;
  fill.style.width    = res.confidence + '%';
  fill.style.background = res.color;
  resultBar.classList.add('visible');
}

// ── Boot ──────────────────────────────────────────────────────────────────
startCamera();
</script>
</body>
</html>
